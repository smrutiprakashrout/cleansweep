name: cleansweep
description: "A utility app to categorize, preview, and delete files."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.0.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10
  shared_storage: ^0.8.1
  path: ^1.9.0
  provider: ^6.1.2
  window_manager: ^0.4.3
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  pdfx: ^2.9.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  shared_storage:
    path: ./plugins/shared_storage
